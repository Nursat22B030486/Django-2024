{% extends 'base.html' %}

{% block title %} Edit Profile {% endblock %}


{% block body %}
{% if form.errors %}
<p>There was an error with your form... </p>
{% endif %}
<h1>Edit Profile </h1>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ profile_form.media }}
    {{ profile_form.as_p }}
    {{ user_form.as_p }}

    <input type="submit" value="Update Profile"/>
</form>
{% endblock %}
