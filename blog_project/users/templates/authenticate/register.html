{% extends 'base.html' %}

{% block title %} Register Page {% endblock %}


{% block body %}
{% if form.errors %}
<p>There was an error with your form </p>
{% endif %}
<h1>Register</h1>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ user_form.as_p }}
    {{ profile_form.media }}
    {{ profile_form.as_p }}

    <input type="submit" value="Register"/>
</form>
{% endblock %}
