<!doctype html>
<html lang="en">

<head>
    <title> {% block title %} {% endblock %} </title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container mx-3">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link {% block homeactive %} {% endblock homeactive %}" aria-current="page"
                        href="/">Home</a>
                </li>
                {% if user.is_authenticated %}
                <li class="nav-item">
                    <a class="nav-link {% block add_blogs_active %} {% endblock add_blogs_active %}"
                        href="/posts/new">Add Blogs</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="#">Hello {{request.user}}</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block profileactive %} {% endblock profileactive %}"
                        href="{% url 'users:profile' user.id %}">Profile</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/users/logout_user/">Logout</a>
                </li>
                {% else %}
                <li class="nav-item">
                    <a class="nav-link {% block registeractive %} {% endblock registeractive %}"
                        href="/users/register/">Register</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% block loginactive %} {% endblock loginactive %}"
                        href="/users/login_user/">Login</a>
                </li>
                {% endif %}
            </ul>

            {% if messages %}
            {% for message in messages %}
            {{message}}
            {% endfor %}
            {% endif%}
        </div>
    </nav>
    {% block body %}
    {% endblock %}


</body>

</html>
